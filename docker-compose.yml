version: '3.8'

services:
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    working_dir: /var/www
    command: >
      sh -c "touch database/database.sqlite &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  angular:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    working_dir: /app
    environment:
      - API_URL=http://localhost:8000/api/v1
    command: sh -c "npm install && npm run start -- --host=0.0.0.0"
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
